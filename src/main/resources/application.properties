# ==============================
# APPLICATION
# ==============================
spring.application.name=demo
server.port=9810

# ==============================
# MYSQL
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/ExpeseTracker?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Anuj@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10

# ==============================
# KAFKA - PRODUCER
# ==============================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.topic.name=testing_json

spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value.serializer=org.example.serializer.UserInfoSerializer

# ==============================
# LOGGING
# ==============================
logging.level.org.springframework.security=DEBUG
logging.level.org.apache.kafka=DEBUG
logging.level.org.springframework.kafka=DEBUG